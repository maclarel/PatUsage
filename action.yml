name: 'GitHub PAT Audit'
description: 'Audit PAT usage across a GitHub org via SAML SSO, audit logs, and workflow secret scanning.'
author: 'jackgkafaty'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  org-pat:
    description: 'Fine-grained PAT with org Administration (read), Members (read), and repo Contents (read) permissions'
    required: true
  org-name:
    description: 'GitHub organization slug (defaults to repository owner)'
    required: false
    default: ''
  lookback-days:
    description: 'Number of days to look back in the audit log'
    required: false
    default: '30'

outputs:
  pat-active-users:
    description: 'Number of users with PAT activity detected'
    value: ${{ steps.report.outputs.pat-active-users }}
  report-path:
    description: 'Path to the reports directory'
    value: 'reports'

runs:
  using: 'composite'
  steps:
    - name: Fetch Repos & Members
      shell: bash
      env:
        ORG_PAT: ${{ inputs.org-pat }}
        ORG_NAME: ${{ inputs.org-name || github.repository_owner }}
        LOOKBACK_DAYS: ${{ inputs.lookback-days }}
      run: bash "${{ github.action_path }}/scripts/fetch-org-data.sh"

    - name: SAML SSO Credentials
      shell: bash
      env:
        ORG_PAT: ${{ inputs.org-pat }}
        ORG_NAME: ${{ inputs.org-name || github.repository_owner }}
        LOOKBACK_DAYS: ${{ inputs.lookback-days }}
      run: bash "${{ github.action_path }}/scripts/saml-credentials.sh"

    - name: Audit Log Events
      shell: bash
      env:
        ORG_PAT: ${{ inputs.org-pat }}
        ORG_NAME: ${{ inputs.org-name || github.repository_owner }}
        LOOKBACK_DAYS: ${{ inputs.lookback-days }}
      run: bash "${{ github.action_path }}/scripts/audit-log.sh"

    - name: Workflow Secret Scanner
      shell: bash
      env:
        ORG_PAT: ${{ inputs.org-pat }}
        ORG_NAME: ${{ inputs.org-name || github.repository_owner }}
        LOOKBACK_DAYS: ${{ inputs.lookback-days }}
      run: bash "${{ github.action_path }}/scripts/workflow-scanner.sh"

    - name: Generate Report & Summary
      id: report
      shell: bash
      env:
        ORG_PAT: ${{ inputs.org-pat }}
        ORG_NAME: ${{ inputs.org-name || github.repository_owner }}
        LOOKBACK_DAYS: ${{ inputs.lookback-days }}
      run: |
        bash "${{ github.action_path }}/scripts/generate-report.sh"
        # Set output
        PAT_ACTIVE="$(jq 'length' reports/user_pat_matrix.json 2>/dev/null || echo 0)"
        echo "pat-active-users=${PAT_ACTIVE}" >> "$GITHUB_OUTPUT"
